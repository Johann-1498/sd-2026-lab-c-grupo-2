<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LogiMarket - Login Seguro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <h1>LogiMarket Perú S.A.C.</h1>
        <h2>Portal Seguro</h2>

        <p class="description">
            Inicio de sesión con usuario, contraseña y código MFA.
        </p>

        <form id="loginForm">
            <label for="username">Usuario</label>
            <input type="text" id="username" placeholder="Ej: admin1" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Ej: admin123" required>

            <label for="mfa_code">Código MFA</label>
            <input type="text" id="mfa_code" placeholder="Ej: 111111" required>

            <button type="submit">Iniciar sesión</button>
        </form>

        <div class="users-box">
            <h3>Usuarios de prueba</h3>
            <p><strong>Admin:</strong> admin1 / admin123 / 111111</p>
            <p><strong>Empleado:</strong> empleado1 / emp123 / 222222</p>
            <p><strong>Cliente:</strong> cliente1 / cli123 / 333333</p>
        </div>

        <p id="message"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
